name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/regentx/hockeynights

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  build-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: hockeynights:ci
          build-args: |
            VITE_API_MODE=backend
            VITE_BACKEND_URL=/api/v1

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'RegentX/hockeynights' &&
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_API_MODE=backend
            VITE_BACKEND_URL=/api/v1

      - name: Copy compose file to Proxmox host
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: docker-compose.yml
          target: /opt/hockeynights/

      - name: Deploy on Proxmox host
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: IMAGE,IMAGE_TAG,GHCR_TOKEN,GHCR_USER,APP_PORT
          env:
            IMAGE: ${{ env.IMAGE_NAME }}
            IMAGE_TAG: latest
            GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
            GHCR_USER: ${{ github.actor }}
            APP_PORT: ${{ vars.APP_PORT || '8081' }}
          script: |
            set -euo pipefail
            cd /opt/hockeynights

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            export IMAGE="${IMAGE}:${IMAGE_TAG}"
            export APP_PORT="${APP_PORT}"

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            docker compose ps
            echo "Deployed main → http://${{ secrets.SSH_HOST }}:${APP_PORT}"
